name: Deploy Snack Attack POS

on:
  push:
    branches: ["main", "master"] # Runs when you push to main or master
  workflow_dispatch: # Allows you to run it manually from the Actions tab

# Sets permissions so GitHub Actions can deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Inject Secrets into HTML
        run: |
          sed -i "s|__GOOGLE_WEB_APP_URL__|${{ secrets.GOOGLE_WEB_APP_URL }}|g" index.html
          sed -i "s|__PAYTM_UPI_ID__|${{ secrets.PAYTM_UPI_ID }}|g" index.html
          
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the whole repository (including your injected index.html)
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
